<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crab Stack VTuber</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    background: #1a2a3e;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
    user-select: none;
  }
  #canvas { display: block; width: 100vw; height: 100vh; }
  #webcam {
    position: fixed; top: 10px; right: 10px;
    width: 160px; height: 120px;
    border-radius: 8px; border: 2px solid rgba(255,255,255,0.2);
    object-fit: cover; transform: scaleX(-1);
    z-index: 10; display: none;
  }
  #webcam.visible { display: block; }
  #controls {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 20;
    opacity: 0.7; transition: opacity 0.3s;
  }
  #controls:hover { opacity: 1; }
  .btn {
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    background: rgba(20,40,60,0.85);
    color: #e0e0e0; cursor: pointer; font-size: 13px;
    backdrop-filter: blur(10px); transition: all 0.2s;
  }
  .btn:hover { background: rgba(40,80,120,0.85); border-color: rgba(255,255,255,0.5); }
  .btn.active { background: rgba(60,130,200,0.6); border-color: rgba(100,180,255,0.7); }
  #status {
    position: fixed; top: 10px; left: 10px;
    font-size: 12px; color: rgba(255,255,255,0.5); z-index: 20;
  }
  body.greenscreen { background: #00ff00; }
  body.transparent { background: transparent; }
  #sensitivity-panel {
    position: fixed; top: 50px; left: 10px; z-index: 20;
    display: none; flex-direction: column; gap: 6px;
    background: rgba(20,40,60,0.9); padding: 12px;
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(10px); font-size: 12px;
  }
  #sensitivity-panel.visible { display: flex; }
  #sensitivity-panel label { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  #sensitivity-panel input[type="range"] { width: 100px; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<video id="webcam" autoplay playsinline muted></video>
<div id="status">Click "Start Tracking" to begin</div>
<div id="controls">
  <button class="btn" id="btn-track">Start Tracking</button>
  <button class="btn" id="btn-mic">Enable Mic</button>
  <button class="btn" id="btn-green">Green Screen</button>
  <button class="btn" id="btn-transparent">Transparent</button>
  <button class="btn" id="btn-preview">Show Webcam</button>
  <button class="btn" id="btn-settings">Settings</button>
</div>
<div id="sensitivity-panel">
  <label>Head Move <input type="range" id="sense-head" min="0.2" max="3" step="0.1" value="1.0"><span id="val-head">1.0</span></label>
  <label>Eye Track <input type="range" id="sense-eye" min="0.2" max="3" step="0.1" value="1.0"><span id="val-eye">1.0</span></label>
  <label>Mouth/Claws <input type="range" id="sense-mouth" min="0.2" max="3" step="0.1" value="1.0"><span id="val-mouth">1.0</span></label>
  <label>Idle Speed <input type="range" id="sense-idle" min="0.2" max="3" step="0.1" value="1.0"><span id="val-idle">1.0</span></label>
</div>

<script type="module">
// ═══════════════════════════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════════════════════════
const CONFIG = {
  headSensitivity: 1.0,
  eyeSensitivity: 1.0,
  mouthSensitivity: 1.0,
  idleSpeed: 1.0,
  smoothing: 0.14,
};

// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

class Spring {
  constructor(stiffness = 0.07, damping = 0.80) {
    this.x = 0; this.y = 0;
    this.vx = 0; this.vy = 0;
    this.targetX = 0; this.targetY = 0;
    this.stiffness = stiffness;
    this.damping = damping;
  }
  setTarget(x, y) { this.targetX = x; this.targetY = y; }
  update() {
    this.vx = (this.vx + (this.targetX - this.x) * this.stiffness) * this.damping;
    this.vy = (this.vy + (this.targetY - this.y) * this.stiffness) * this.damping;
    this.x += this.vx; this.y += this.vy;
  }
}

// Seeded random for consistent wobble
function srand(seed) {
  const x = Math.sin(seed * 127.1 + seed * 311.7) * 43758.5453;
  return x - Math.floor(x);
}
let wSeed = 0;

function wobblyEllipse(ctx, cx, cy, rx, ry, w = 1.5, seed = null) {
  if (seed === null) seed = wSeed++;
  const n = 18;
  ctx.beginPath();
  for (let i = 0; i <= n; i++) {
    const a = (i / n) * Math.PI * 2;
    const px = cx + Math.cos(a) * rx + (srand(seed + i * 2) - 0.5) * w;
    const py = cy + Math.sin(a) * ry + (srand(seed + i * 2 + 1) - 0.5) * w;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

function wobblyLine(ctx, x1, y1, x2, y2, w = 1.5, seed = null) {
  if (seed === null) seed = wSeed++;
  ctx.beginPath(); ctx.moveTo(x1, y1);
  for (let j = 1; j <= 5; j++) {
    const t = j / 5;
    ctx.lineTo(
      x1 + (x2 - x1) * t + (srand(seed + j * 2) - 0.5) * w,
      y1 + (y2 - y1) * t + (srand(seed + j * 2 + 1) - 0.5) * w
    );
  }
  ctx.stroke();
}

// ═══════════════════════════════════════════════════════════
// TRACKING STATE
// ═══════════════════════════════════════════════════════════
const tracking = {
  headYaw: 0, headPitch: 0, headRoll: 0,
  eyeBlinkL: 0, eyeBlinkR: 0,
  mouthOpen: 0,
  eyeGazeX: 0, eyeGazeY: 0,
  active: false,
};
const smooth = { ...tracking };

function updateSmoothing() {
  const t = CONFIG.smoothing;
  smooth.headYaw = lerp(smooth.headYaw, tracking.headYaw * CONFIG.headSensitivity, t);
  smooth.headPitch = lerp(smooth.headPitch, tracking.headPitch * CONFIG.headSensitivity, t);
  smooth.headRoll = lerp(smooth.headRoll, tracking.headRoll * CONFIG.headSensitivity, t);
  smooth.eyeBlinkL = lerp(smooth.eyeBlinkL, tracking.eyeBlinkL, t * 2);
  smooth.eyeBlinkR = lerp(smooth.eyeBlinkR, tracking.eyeBlinkR, t * 2);
  smooth.mouthOpen = lerp(smooth.mouthOpen, tracking.mouthOpen * CONFIG.mouthSensitivity, t * 2.5);
  smooth.eyeGazeX = lerp(smooth.eyeGazeX, tracking.eyeGazeX * CONFIG.eyeSensitivity, t);
  smooth.eyeGazeY = lerp(smooth.eyeGazeY, tracking.eyeGazeY * CONFIG.eyeSensitivity, t);
}

// ═══════════════════════════════════════════════════════════
// AUDIO REACTIVITY
// ═══════════════════════════════════════════════════════════
let audioCtx = null, analyser = null, micActive = false;

async function startMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new AudioContext();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256; analyser.smoothingTimeConstant = 0.5;
    src.connect(analyser);
    micActive = true; return true;
  } catch { return false; }
}

function getAudioLevel() {
  if (!analyser) return 0;
  const d = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(d);
  let s = 0; for (let i = 2; i < 30; i++) s += d[i];
  return clamp(s / (28 * 128), 0, 1);
}

// ═══════════════════════════════════════════════════════════
// CRAB DEFINITION
// ═══════════════════════════════════════════════════════════
// Each crab in the stack has its own springs and delayed tracking
class Crab {
  constructor(shellW, shellH, color, accentColor, delay) {
    this.shellW = shellW;
    this.shellH = shellH;
    this.color = color;
    this.accent = accentColor;
    this.delay = delay; // 0 = instant (top), higher = more lag

    // Spring for the whole crab body sway
    this.bodySpring = new Spring(0.06 * (1 - delay * 0.3), 0.78);
    // Springs for eye stalks
    this.eyeSpringL = new Spring(0.09, 0.76);
    this.eyeSpringR = new Spring(0.09, 0.76);
    // Spring for claw open amount
    this.clawSpring = new Spring(0.12, 0.75);

    // Delayed smooth values
    this.sHeadYaw = 0;
    this.sHeadPitch = 0;
    this.sHeadRoll = 0;
    this.sBlinkL = 0;
    this.sBlinkR = 0;
    this.sMouth = 0;
    this.sGazeX = 0;
    this.sGazeY = 0;
  }

  updateTracking() {
    const d = 0.08 + this.delay * 0.06; // slower smoothing for lower crabs
    this.sHeadYaw = lerp(this.sHeadYaw, smooth.headYaw, d);
    this.sHeadPitch = lerp(this.sHeadPitch, smooth.headPitch, d);
    this.sHeadRoll = lerp(this.sHeadRoll, smooth.headRoll, d);
    this.sBlinkL = lerp(this.sBlinkL, smooth.eyeBlinkL, d * 1.5);
    this.sBlinkR = lerp(this.sBlinkR, smooth.eyeBlinkR, d * 1.5);
    this.sMouth = lerp(this.sMouth, smooth.mouthOpen, d * 2);
    this.sGazeX = lerp(this.sGazeX, smooth.eyeGazeX, d);
    this.sGazeY = lerp(this.sGazeY, smooth.eyeGazeY, d);

    // Body spring follows head
    this.bodySpring.setTarget(this.sHeadYaw * 25, this.sHeadPitch * 12);
    this.bodySpring.update();

    // Eye stalks spring opposite to movement (inertia)
    this.eyeSpringL.setTarget(-this.sHeadYaw * 12, -this.sHeadPitch * 8);
    this.eyeSpringL.update();
    this.eyeSpringR.setTarget(-this.sHeadYaw * 12, -this.sHeadPitch * 8);
    this.eyeSpringR.update();

    // Claws open with mouth
    this.clawSpring.setTarget(this.sMouth, 0);
    this.clawSpring.update();
  }
}

// ═══════════════════════════════════════════════════════════
// THREE CRABS IN A STACK
// ═══════════════════════════════════════════════════════════
const crabs = [
  // Bottom crab: largest, most delayed, deep red
  new Crab(190, 80, '#b83030', '#8a1c1c', 0.7),
  // Middle crab: medium, moderate delay, orange-red
  new Crab(150, 65, '#d45a20', '#a84010', 0.35),
  // Top crab: smallest, most responsive, bright orange
  new Crab(115, 52, '#e88030', '#c06020', 0.0),
];

let time = 0;

// ═══════════════════════════════════════════════════════════
// DRAWING FUNCTIONS
// ═══════════════════════════════════════════════════════════

function drawCrabStack(ctx, cx, cy, scale) {
  time += 0.016 * CONFIG.idleSpeed;
  wSeed = 100;

  crabs.forEach(c => c.updateTracking());

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  // Draw bottom to top
  let stackY = 60; // bottom crab baseline
  crabs.forEach((crab, i) => {
    const yOff = stackY;
    stackY -= crab.shellH * 1.35; // next crab sits on top

    ctx.save();
    // Body sway
    ctx.translate(crab.bodySpring.x, yOff + crab.bodySpring.y);
    ctx.rotate(crab.sHeadRoll * 0.08 * (1 - crab.delay * 0.5));

    // Idle wobble unique to each crab
    const idleX = Math.sin(time * (0.8 + i * 0.3) + i * 2.1) * 3;
    const idleY = Math.sin(time * (1.2 + i * 0.2) + i * 1.3) * 2;
    ctx.translate(idleX, idleY);

    drawSingleCrab(ctx, crab, i, time);
    ctx.restore();
  });

  ctx.restore();
}

function drawSingleCrab(ctx, crab, index, t) {
  const sw = crab.shellW;
  const sh = crab.shellH;

  // ---- LEGS (behind shell) ----
  drawLegs(ctx, crab, index, t);

  // ---- SHELL ----
  drawShell(ctx, crab, index);

  // ---- EYE STALKS ----
  drawEyeStalks(ctx, crab, index);

  // ---- CLAWS ----
  drawClaws(ctx, crab, index, t);
}

function drawShell(ctx, crab, index) {
  const sw = crab.shellW;
  const sh = crab.shellH;
  const seed = 1000 + index * 100;

  // Shadow under shell
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  wobblyEllipse(ctx, 0, sh * 0.15, sw * 0.52, sh * 0.3, 2, seed);
  ctx.fill();

  // Main shell (dome shape - top half of ellipse + bottom flat)
  ctx.fillStyle = crab.color;
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2.5;

  // Full dome
  ctx.beginPath();
  const segs = 20;
  for (let i = 0; i <= segs; i++) {
    const a = Math.PI + (i / segs) * Math.PI; // top half arc
    const px = Math.cos(a) * sw * 0.5 + (srand(seed + 50 + i * 2) - 0.5) * 2;
    const py = Math.sin(a) * sh * 0.85 + (srand(seed + 50 + i * 2 + 1) - 0.5) * 2;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Shell highlight
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  wobblyEllipse(ctx, -sw * 0.1, -sh * 0.35, sw * 0.25, sh * 0.2, 1, seed + 10);
  ctx.fill();

  // Shell pattern lines
  ctx.strokeStyle = crab.accent;
  ctx.lineWidth = 1.5;
  wobblyLine(ctx, -sw * 0.3, -sh * 0.15, sw * 0.3, -sh * 0.15, 2, seed + 20);
  wobblyLine(ctx, -sw * 0.2, -sh * 0.4, sw * 0.2, -sh * 0.4, 1.5, seed + 21);

  // Shell texture dots
  ctx.fillStyle = crab.accent;
  for (let i = 0; i < 5; i++) {
    const dx = (srand(seed + 30 + i) - 0.5) * sw * 0.6;
    const dy = -sh * 0.1 - srand(seed + 35 + i) * sh * 0.5;
    ctx.beginPath();
    ctx.arc(dx, dy, 2 + srand(seed + 40 + i) * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Belly/underside (slight curve at bottom)
  ctx.fillStyle = lighten(crab.color, 30);
  ctx.beginPath();
  ctx.ellipse(0, 0, sw * 0.4, sh * 0.15, 0, 0, Math.PI);
  ctx.fill();
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawEyeStalks(ctx, crab, index) {
  const sw = crab.shellW;
  const sh = crab.shellH;
  const seed = 2000 + index * 100;

  const stalkLen = sh * 0.7 + 15;
  const eyeR = 8 + (2 - index) * 1.5; // bigger eyes for bigger crabs

  // Left eye stalk
  const lBaseX = -sw * 0.18;
  const lBaseY = -sh * 0.7;
  const lTipX = lBaseX - 15 + crab.eyeSpringL.x + crab.sGazeX * 5;
  const lTipY = lBaseY - stalkLen + crab.eyeSpringL.y;

  ctx.strokeStyle = crab.color;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(lBaseX, lBaseY);
  ctx.quadraticCurveTo(lBaseX - 5 + crab.eyeSpringL.x * 0.3, lBaseY - stalkLen * 0.5, lTipX, lTipY);
  ctx.stroke();

  // Left eye stalk outline
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Left eyeball
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  wobblyEllipse(ctx, lTipX, lTipY, eyeR, eyeR * 0.9, 1, seed);
  ctx.fill();
  ctx.stroke();

  // Left pupil
  const lpX = lTipX + crab.sGazeX * 4;
  const lpY = lTipY + crab.sGazeY * 3;
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(lpX, lpY, eyeR * 0.45, 0, Math.PI * 2);
  ctx.fill();

  // Left highlight
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(lpX + 2, lpY - 2, eyeR * 0.18, 0, Math.PI * 2);
  ctx.fill();

  // Left blink
  if (crab.sBlinkL > 0.05) {
    ctx.fillStyle = crab.color;
    ctx.beginPath();
    ctx.ellipse(lTipX, lTipY - eyeR * (1 - crab.sBlinkL), eyeR + 1, eyeR * crab.sBlinkL, 0, 0, Math.PI);
    ctx.fill();
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(lTipX, lTipY, eyeR, eyeR * 0.9 * (1 - crab.sBlinkL * 0.9), 0, Math.PI + 0.15, -0.15);
    ctx.stroke();
  }

  // Right eye stalk
  const rBaseX = sw * 0.18;
  const rBaseY = -sh * 0.7;
  const rTipX = rBaseX + 15 + crab.eyeSpringR.x + crab.sGazeX * 5;
  const rTipY = rBaseY - stalkLen + crab.eyeSpringR.y;

  ctx.strokeStyle = crab.color;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(rBaseX, rBaseY);
  ctx.quadraticCurveTo(rBaseX + 5 + crab.eyeSpringR.x * 0.3, rBaseY - stalkLen * 0.5, rTipX, rTipY);
  ctx.stroke();
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Right eyeball
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  wobblyEllipse(ctx, rTipX, rTipY, eyeR, eyeR * 0.9, 1, seed + 10);
  ctx.fill();
  ctx.stroke();

  // Right pupil
  const rpX = rTipX + crab.sGazeX * 4;
  const rpY = rTipY + crab.sGazeY * 3;
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(rpX, rpY, eyeR * 0.45, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(rpX + 2, rpY - 2, eyeR * 0.18, 0, Math.PI * 2);
  ctx.fill();

  // Right blink
  if (crab.sBlinkR > 0.05) {
    ctx.fillStyle = crab.color;
    ctx.beginPath();
    ctx.ellipse(rTipX, rTipY - eyeR * (1 - crab.sBlinkR), eyeR + 1, eyeR * crab.sBlinkR, 0, 0, Math.PI);
    ctx.fill();
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(rTipX, rTipY, eyeR, eyeR * 0.9 * (1 - crab.sBlinkR * 0.9), 0, Math.PI + 0.15, -0.15);
    ctx.stroke();
  }
}

function drawClaws(ctx, crab, index, t) {
  const sw = crab.shellW;
  const sh = crab.shellH;
  const seed = 3000 + index * 100;

  const clawOpen = crab.clawSpring.x;
  // Idle snapping for each crab at different rates
  const idleSnap = Math.max(0, Math.sin(t * (1.5 + index * 0.7) + index * 3)) * 0.3;
  const openAmt = clamp(clawOpen + idleSnap, 0, 1);

  // Arm length proportional to shell
  const armLen = sw * 0.4;
  const clawSize = sw * 0.18;

  // ---- LEFT CLAW ----
  ctx.save();
  ctx.translate(-sw * 0.5, -sh * 0.1);
  const lArmAngle = -0.3 + Math.sin(t * 0.6 + index) * 0.08;
  ctx.rotate(lArmAngle);

  // Arm segment
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2.5;
  ctx.fillStyle = lighten(crab.color, 10);
  roundedRect(ctx, -armLen, -7, armLen, 14, 5);
  ctx.fill();
  ctx.stroke();

  // Elbow
  ctx.fillStyle = crab.accent;
  ctx.beginPath();
  ctx.arc(-armLen, 0, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Claw at end
  drawClawPincer(ctx, -armLen - 5, 0, clawSize, openAmt, true, crab, seed);
  ctx.restore();

  // ---- RIGHT CLAW ----
  ctx.save();
  ctx.translate(sw * 0.5, -sh * 0.1);
  const rArmAngle = 0.3 + Math.sin(t * 0.6 + index + 2) * 0.08;
  ctx.rotate(rArmAngle);

  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2.5;
  ctx.fillStyle = lighten(crab.color, 10);
  roundedRect(ctx, 0, -7, armLen, 14, 5);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = crab.accent;
  ctx.beginPath();
  ctx.arc(armLen, 0, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  drawClawPincer(ctx, armLen + 5, 0, clawSize, openAmt, false, crab, seed + 50);
  ctx.restore();
}

function drawClawPincer(ctx, x, y, size, openAmt, isLeft, crab, seed) {
  const dir = isLeft ? -1 : 1;
  const angle = openAmt * 0.45; // how wide the pincer opens

  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2.5;

  // Top pincer
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(-angle * dir);
  ctx.fillStyle = crab.color;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(dir * size, -size * 0.4);
  ctx.quadraticCurveTo(dir * size * 1.2, -size * 0.1, dir * size * 0.9, size * 0.05);
  ctx.lineTo(0, 0);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Serrated edge (teeth)
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    const t = 0.3 + i * 0.2;
    const tx = dir * size * t;
    const ty = lerp(0, size * 0.05, t);
    ctx.beginPath();
    ctx.arc(tx + dir * 2, ty, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // Bottom pincer
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle * dir);
  ctx.fillStyle = lighten(crab.color, 15);
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(dir * size * 0.9, -size * 0.05);
  ctx.quadraticCurveTo(dir * size * 1.2, size * 0.1, dir * size, size * 0.4);
  ctx.lineTo(0, 0);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  for (let i = 0; i < 3; i++) {
    const t = 0.3 + i * 0.2;
    const tx = dir * size * t;
    const ty = lerp(-0.05, -size * 0.05, t);
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(tx + dir * 2, ty, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawLegs(ctx, crab, index, t) {
  const sw = crab.shellW;
  const sh = crab.shellH;
  const legLen1 = sw * 0.25;
  const legLen2 = sw * 0.3;

  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';

  // 3 legs per side
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < 3; i++) {
      const baseX = side * sw * (0.25 + i * 0.1);
      const baseY = -sh * 0.05 + i * sh * 0.15;

      // Walking cycle - each leg offset in phase
      const phase = t * (1.0 + index * 0.3) + i * 1.2 + (side > 0 ? 0.6 : 0) + index * 1.5;
      const lift = Math.max(0, Math.sin(phase)) * 8;
      const stride = Math.cos(phase) * 6;

      // Joint angles
      const a1 = side * (0.6 + i * 0.15) + stride * 0.02 * side;
      const kneeX = baseX + Math.cos(a1) * legLen1 * side;
      const kneeY = baseY + Math.sin(Math.abs(a1)) * legLen1 * 0.5 + legLen1 * 0.3;

      const footX = kneeX + side * legLen2 * 0.7 + stride;
      const footY = kneeY + legLen2 * 0.5 - lift;

      // Leg color
      ctx.strokeStyle = crab.accent;
      ctx.lineWidth = 3.5;

      // Upper leg
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      ctx.lineTo(kneeX, kneeY);
      ctx.stroke();

      // Lower leg
      ctx.beginPath();
      ctx.moveTo(kneeX, kneeY);
      ctx.lineTo(footX, footY);
      ctx.stroke();

      // Outline
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      ctx.lineTo(kneeX, kneeY);
      ctx.lineTo(footX, footY);
      ctx.stroke();

      // Knee joint dot
      ctx.fillStyle = crab.color;
      ctx.beginPath();
      ctx.arc(kneeX, kneeY, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Foot tip
      ctx.fillStyle = crab.accent;
      ctx.beginPath();
      ctx.arc(footX, footY, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function lighten(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = Math.min(255, r + amt);
  g = Math.min(255, g + amt);
  b = Math.min(255, b + amt);
  return `rgb(${r},${g},${b})`;
}

function roundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ═══════════════════════════════════════════════════════════
// BUBBLES (ambient underwater feel)
// ═══════════════════════════════════════════════════════════
const bubbles = [];
for (let i = 0; i < 12; i++) {
  bubbles.push({
    x: Math.random() * 2 - 1,   // -1 to 1, mapped to screen
    y: Math.random(),
    r: 2 + Math.random() * 6,
    speed: 0.1 + Math.random() * 0.3,
    wobble: Math.random() * Math.PI * 2,
  });
}

function drawBubbles(ctx, w, h) {
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;

  bubbles.forEach(b => {
    b.y -= b.speed * 0.002;
    b.wobble += 0.02;
    if (b.y < -0.1) { b.y = 1.1; b.x = Math.random() * 2 - 1; }

    const bx = (b.x + Math.sin(b.wobble) * 0.02) * w * 0.5 + w * 0.5;
    const by = b.y * h;

    ctx.beginPath();
    ctx.arc(bx, by, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.arc(bx - b.r * 0.3, by - b.r * 0.3, b.r * 0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
  });
}

// ═══════════════════════════════════════════════════════════
// FACE TRACKING (MediaPipe)
// ═══════════════════════════════════════════════════════════
let faceLandmarker = null;
let trackingActive = false;

async function initFaceTracking() {
  const statusEl = document.getElementById('status');
  statusEl.textContent = 'Loading face tracking model...';
  try {
    const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs');
    const { FaceLandmarker, FilesetResolver } = vision;
    const fs = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
    );
    faceLandmarker = await FaceLandmarker.createFromOptions(fs, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate: 'GPU'
      },
      outputFaceBlendshapes: true,
      outputFacialTransformationMatrixes: true,
      runningMode: 'VIDEO',
      numFaces: 1
    });
    statusEl.textContent = 'Face tracking ready!';
    setTimeout(() => { statusEl.textContent = ''; }, 2000);
    return true;
  } catch (e) {
    console.error('Face tracking init failed:', e);
    statusEl.textContent = 'Face tracking unavailable - use mic for audio reactivity';
    return false;
  }
}

async function startCamera(videoEl) {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' }
    });
    videoEl.srcObject = stream;
    await new Promise(r => { videoEl.onloadeddata = r; });
    return true;
  } catch { return false; }
}

let lastVideoTime = -1;
function processTracking(videoEl) {
  if (!faceLandmarker || !trackingActive) return;
  if (videoEl.readyState < 2) return;
  if (videoEl.currentTime === lastVideoTime) return;
  lastVideoTime = videoEl.currentTime;
  try {
    const results = faceLandmarker.detectForVideo(videoEl, performance.now());
    if (results.faceBlendshapes?.length > 0) {
      const bs = results.faceBlendshapes[0].categories;
      const get = n => { const c = bs.find(b => b.categoryName === n); return c ? c.score : 0; };
      tracking.eyeBlinkL = get('eyeBlinkLeft');
      tracking.eyeBlinkR = get('eyeBlinkRight');
      tracking.mouthOpen = get('jawOpen');
      tracking.eyeGazeX = (get('eyeLookOutLeft') - get('eyeLookInLeft') + get('eyeLookInRight') - get('eyeLookOutRight')) * 0.5;
      tracking.eyeGazeY = (get('eyeLookDownLeft') + get('eyeLookDownRight') - get('eyeLookUpLeft') - get('eyeLookUpRight')) * 0.5;
      tracking.active = true;
    }
    if (results.facialTransformationMatrixes?.length > 0) {
      const m = results.facialTransformationMatrixes[0].data;
      tracking.headYaw = Math.asin(-m[8]) / (Math.PI / 4);
      tracking.headPitch = Math.atan2(m[9], m[10]) / (Math.PI / 4);
      tracking.headRoll = Math.atan2(m[4], m[0]) / (Math.PI / 4);
    }
  } catch {}
}

// ═══════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx2d = canvas.getContext('2d');
const videoEl = document.getElementById('webcam');

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  ctx2d.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
window.addEventListener('resize', resize);
resize();

function frame() {
  const w = window.innerWidth, h = window.innerHeight;
  ctx2d.clearRect(0, 0, w, h);

  processTracking(videoEl);

  if (micActive && !tracking.active) {
    tracking.mouthOpen = getAudioLevel();
  } else if (micActive && tracking.active) {
    tracking.mouthOpen = Math.max(tracking.mouthOpen, getAudioLevel() * 0.5);
  }

  updateSmoothing();

  // Ambient bubbles
  if (!document.body.classList.contains('greenscreen') && !document.body.classList.contains('transparent')) {
    drawBubbles(ctx2d, w, h);
  }

  // Ground shadow
  const baseScale = Math.min(w / 550, h / 650) * 1.0;
  const cx = w / 2, cy = h * 0.52;
  ctx2d.fillStyle = 'rgba(0,0,0,0.08)';
  ctx2d.beginPath();
  ctx2d.ellipse(cx, cy + 110 * baseScale, 120 * baseScale, 18 * baseScale, 0, 0, Math.PI * 2);
  ctx2d.fill();

  drawCrabStack(ctx2d, cx, cy, baseScale);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ═══════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-track').addEventListener('click', async function() {
  if (trackingActive) {
    trackingActive = false; tracking.active = false;
    this.textContent = 'Start Tracking'; this.classList.remove('active'); return;
  }
  this.textContent = 'Loading...';
  const cam = await startCamera(videoEl);
  if (!cam) { this.textContent = 'Start Tracking'; return; }
  const ok = await initFaceTracking();
  if (ok) { trackingActive = true; this.textContent = 'Stop Tracking'; this.classList.add('active'); }
  else { this.textContent = 'Start Tracking'; }
});

document.getElementById('btn-mic').addEventListener('click', async function() {
  if (micActive) { micActive = false; this.textContent = 'Enable Mic'; this.classList.remove('active'); return; }
  if (await startMic()) { this.textContent = 'Disable Mic'; this.classList.add('active'); }
});

document.getElementById('btn-green').addEventListener('click', function() {
  document.body.classList.toggle('greenscreen');
  document.body.classList.remove('transparent');
  this.classList.toggle('active');
  document.getElementById('btn-transparent').classList.remove('active');
});

document.getElementById('btn-transparent').addEventListener('click', function() {
  document.body.classList.toggle('transparent');
  document.body.classList.remove('greenscreen');
  this.classList.toggle('active');
  document.getElementById('btn-green').classList.remove('active');
});

document.getElementById('btn-preview').addEventListener('click', function() {
  videoEl.classList.toggle('visible'); this.classList.toggle('active');
});

document.getElementById('btn-settings').addEventListener('click', function() {
  document.getElementById('sensitivity-panel').classList.toggle('visible');
  this.classList.toggle('active');
});

['head','eye','mouth','idle'].forEach(k => {
  const sl = document.getElementById(`sense-${k}`);
  const dsp = document.getElementById(`val-${k}`);
  sl.addEventListener('input', () => {
    const v = parseFloat(sl.value); dsp.textContent = v.toFixed(1);
    if (k==='head') CONFIG.headSensitivity=v;
    if (k==='eye') CONFIG.eyeSensitivity=v;
    if (k==='mouth') CONFIG.mouthSensitivity=v;
    if (k==='idle') CONFIG.idleSpeed=v;
  });
});

document.addEventListener('keydown', e => {
  if (e.key==='g') document.getElementById('btn-green').click();
  if (e.key==='t') document.getElementById('btn-transparent').click();
  if (e.key==='w') document.getElementById('btn-preview').click();
  if (e.key==='s') document.getElementById('btn-settings').click();
});
</script>
