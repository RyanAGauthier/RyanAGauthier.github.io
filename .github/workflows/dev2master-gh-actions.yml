# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Alter index.html to dynamically render new folders and update resume

on:
  # Runs on pushes targeting the dev branch
  push:
    branches: ["dev"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
            ref: dev

      - name: Set up python....
        uses: actions/setup-python@v6
        with:
            python-version: '3.13' 
      
      - name: Install dependencies...
        run: |
            pip install jinja2
            pip install python-dateutil

      - name: Run the script
        run: python renderer.py
      - name: Git actions
        run: |
            git add .
            git commit -m "Robot pull!"
            git push -u origin dev
      #Dope recommendation from https://stackoverflow.com/questions/68057744/create-pull-request-with-github-action
      - name: create pull request
        run: gh pr create -B master -H dev --title 'Merge branch_to_merge into base_branch' --body 'Created by Github action'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


